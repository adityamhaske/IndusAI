<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industrial AI Assistant</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        .chat-box { border: 1px solid #ccc; padding: 20px; height: 400px; overflow-y: scroll; margin-bottom: 20px; }
        .input-area { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 10px; }
        button { padding: 10px 20px; }
    </style>
</head>
<body>
    <h1>Industrial AI Assistant</h1>
    <div class="chat-box" id="chat-box">
        <p><em>System: Ready to assist based on local documents.</em></p>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask about faults, specs, etc..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const text = input.value;
            if (!text) return;

            // Add user message
            chatBox.innerHTML += `<p><strong>You:</strong> ${text}</p>`;
            input.value = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: text })
                });
                const data = await response.json();
                
                chatBox.innerHTML += `<div style="background: #f0f0f0; padding: 10px; margin: 5px 0;">
                    <p><strong>AI:</strong> ${data.summary}</p>
                    <small>Confidence: ${data.confidence_score} | Sources: ${data.source_sections.join(', ')}</small>
                </div>`;
            } catch (e) {
                chatBox.innerHTML += `<p style="color:red">Error: ${e.message}</p>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
