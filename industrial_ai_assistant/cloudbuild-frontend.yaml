steps:
  - name: 'node:20'
    entrypoint: npm
    args: ['install']
    dir: 'client'
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']
    dir: 'client'
  - name: 'node:20'
    entrypoint: bash
    args:
      - '-c'
      - |
        npm install -g firebase-tools
        export GOOGLE_APPLICATION_CREDENTIALS="/workspace/indus-ai-cloud-101-firebase-adminsdk-fbsvc-006a5f3d3b.json"
        firebase deploy --only hosting --project indus-ai-cloud-101 --non-interactive
